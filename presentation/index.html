<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volere Agentic Framework</title>
<style>
  /* === Reset & Base === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #f0f6fc;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --green: #7ee787;
    --purple: #d2a8ff;
    --blue: #79c0ff;
    --red: #f85149;
    --orange: #ffa657;
    --cyan: #a5d6ff;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  html {
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    overflow-x: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
  }

  /* === Sections === */
  section {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 4rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .section-inner {
    max-width: 960px;
    width: 100%;
  }

  /* === Progress Bar === */
  #progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--purple);
    width: 0%;
    z-index: 100;
    transition: width 0.1s linear;
  }

  /* === Dot Nav === */
  #dot-nav {
    position: fixed;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
  }

  .dot.active {
    background: var(--purple);
    transform: scale(1.4);
  }

  /* === Animation base === */
  .fade-in {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .stagger { transition-delay: var(--delay, 0s); }

  /* === Typography === */
  h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.2; }
  h2 { font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 600; line-height: 1.3; }
  h3 { font-size: clamp(1rem, 2vw, 1.25rem); font-weight: 600; }
  .label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }
  .subtitle { color: var(--text-muted); font-size: clamp(0.875rem, 1.5vw, 1rem); margin-top: 0.5rem; }
  .mono { font-family: var(--font-mono); }

  /* === Responsive === */
  @media (max-width: 768px) {
    section { padding: 2rem 1rem; }
    #dot-nav { right: 0.75rem; gap: 8px; }
    .dot { width: 6px; height: 6px; }
  }
</style>
</head>
<body>

<div id="progress"></div>

<nav id="dot-nav"></nav>

<!-- Section 1: Hero -->
<section id="s1"><div class="section-inner"></div></section>

<!-- Section 2: The Promise -->
<section id="s2"><div class="section-inner"></div></section>

<!-- Section 3: What Breaks -->
<section id="s3"><div class="section-inner"></div></section>

<!-- Section 4: The Missing Piece -->
<section id="s4"><div class="section-inner"></div></section>

<!-- Section 5: Three Loops Overview -->
<section id="s5"><div class="section-inner"></div></section>

<!-- Section 6: Loop 1 - Discovery -->
<section id="s6"><div class="section-inner"></div></section>

<!-- Section 7: Loop 2 - Volere -->
<section id="s7"><div class="section-inner"></div></section>

<!-- Section 8: Loop 3 - Superpowers -->
<section id="s8"><div class="section-inner"></div></section>

<!-- Section 9: The Handoffs -->
<section id="s9"><div class="section-inner"></div></section>

<!-- Section 10: The Snow Card -->
<section id="s10"><div class="section-inner"></div></section>

<!-- Section 11: Multi-dimensional Fit Criteria -->
<section id="s11"><div class="section-inner"></div></section>

<!-- Section 12: DAL Graduated Rigour -->
<section id="s12"><div class="section-inner"></div></section>

<!-- Section 13: Hard + Soft Enforcement -->
<section id="s13"><div class="section-inner"></div></section>

<!-- Section 14: Dogfooding -->
<section id="s14"><div class="section-inner"></div></section>

<!-- Section 15: Getting Started -->
<section id="s15"><div class="section-inner"></div></section>

<script>
(function() {
  const sections = document.querySelectorAll('section');
  const dotNav = document.getElementById('dot-nav');
  const progress = document.getElementById('progress');

  // Build dot nav
  sections.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => s.scrollIntoView({ behavior: 'smooth' }));
    dotNav.appendChild(dot);
  });
  const dots = dotNav.querySelectorAll('.dot');

  // Intersection Observer for animations + active dot
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // Activate animations
        entry.target.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
        // Update dots
        const idx = Array.from(sections).indexOf(entry.target);
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      }
    });
  }, { threshold: 0.5 });

  sections.forEach(s => observer.observe(s));

  // Progress bar
  document.documentElement.addEventListener('scroll', () => {
    const scrollTop = document.documentElement.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    progress.style.width = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) + '%' : '0%';
  });

  // Keyboard nav
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      const current = Array.from(dots).findIndex(d => d.classList.contains('active'));
      if (current < sections.length - 1) sections[current + 1].scrollIntoView({ behavior: 'smooth' });
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const current = Array.from(dots).findIndex(d => d.classList.contains('active'));
      if (current > 0) sections[current - 1].scrollIntoView({ behavior: 'smooth' });
    }
  });

  // Counter animation utility (used by Task 3 and Task 7)
  window.animateCounters = function(container) {
    container.querySelectorAll('[data-count]').forEach(el => {
      const target = parseFloat(el.dataset.count);
      const suffix = el.dataset.suffix || '';
      const duration = 1500;
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(eased * target);
        el.textContent = current + suffix;
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  };

  // Trigger counters when sections become visible
  const counterObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !entry.target.dataset.counted) {
        entry.target.dataset.counted = 'true';
        animateCounters(entry.target);
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('[data-has-counters]').forEach(s => counterObserver.observe(s));
})();
</script>

</body>
</html>
