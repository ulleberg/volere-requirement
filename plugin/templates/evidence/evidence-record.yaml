# Volere Evidence Record
# Proof that a fit criterion was verified.
# Store in: docs/evidence/automated/ (from tests) or docs/evidence/manual/ (from labs/reviews)

requirement: UR-001            # Requirement ID
dimension: user                # Fit criteria dimension
criterion: ""                  # The specific fit criterion text

method: test                   # test | analysis | review | demonstration | formal-methods
status: planned                # planned | collected | verified | expired

collected:
  date: ""                     # ISO 8601 datetime
  by: ""                       # Agent role or person name
  source: ""                   # Command or process (e.g., "go test ./internal/auth/ -run TestCORS")
  result: PASS                 # PASS | FAIL
  tests_run: 0
  tests_passed: 0

verified:
  date: ""
  by: ""
  method: automated            # automated | human-review | lab-test

# evidence_artifact:           # For lab tests, reviews, demonstrations
#   type: test-report
#   path: docs/evidence/reports/report.pdf
#   lab: "TÜV Rheinland, ref: TR-2026-04-1234"

expires_when:
  - file_changed: ""           # Path to code file — evidence expires if this changes
  - requirement_changed: ""    # Requirement ID — evidence expires if this changes

# notes: ""                    # Additional context
