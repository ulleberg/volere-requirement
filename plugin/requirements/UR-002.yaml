id: UR-002
type: functional
title: Write a requirement card with guided skill

description: >
  The write-requirement skill guides an agent through creating a Volere
  requirement card in YAML format with all required fields, multi-dimensional
  fit criteria, and schema validation.

rationale: >
  Agents skip fields, write vague fit criteria, and forget traceability
  unless guided. The skill enforces the Volere snow card structure and
  catches quality issues before the card is committed. Proven need:
  thul-studio's original 26 URs had 13 fit criteria that needed rewriting.

fit_criteria:
  user:
    criterion: >
      The write-requirement skill produces a YAML card that passes JSON Schema
      validation against requirement.schema.json. The card contains all required
      fields: id, type, title, description, rationale, fit_criteria (at least
      one dimension), dal, priority, status, origin. Every fit criterion contains
      a measurable condition. The validator flags vague language automatically.
    verification: test
    test_type: integration

dal: C
priority: must
status: proposed
satisfaction: 5
dissatisfaction: 5

origin:
  stakeholder: Thomas Ulleberg
  date: "2026-03-30"
  trigger: "13 of 26 thul-studio fit criteria needed rewriting — agents write vague criteria without guidance"

depends_on: [UR-001]
conflicts: []
decomposed_to: []

history:
