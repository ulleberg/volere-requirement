id: TC-009
type: technical-constraint
title: "Suspect link lifecycle"

description: >
  The system must manage the full lifecycle of suspect links — marking,
  resolving, listing, checking, and auto-detection — persisted in
  .volere/suspects.yaml.

rationale: "Pending owner review"

fit_criteria:
  user:
    criterion: >
      suspect mark records suspect with timestamp, reason, source in
      .volere/suspects.yaml. suspect resolve changes status to resolved.
      suspect list shows unresolved. suspect check exits 1 if unresolved
      exist. suspect auto marks dependents of recently changed requirements.
    verification: test
    test_type: integration
    verification_method: integration
  operational:
    criterion: >
      suspect auto detects when a card's own fit_criteria block changes
      (not just its dependents) and marks that card as suspect with reason
      "fit criteria changed — re-verify acceptance tests". A card whose
      fit criteria dimensions were added, removed, or modified is flagged
      for re-verification.
    verification: test
    test_type: integration

dal: B
priority: must
status: implemented

origin:
  stakeholder: extract-requirements
  date: "2026-03-31"
  trigger: "Codebase extraction"
  source: "plugin/cli/suspect.sh"

serves:
  - UR-008

history:
  - date: "2026-03-31"
    action: created
    by: extract-requirements
  - date: "2026-04-02"
    action: "added operational fit criterion — self-suspect on fit criteria change"
    by: thomas-ulleberg
