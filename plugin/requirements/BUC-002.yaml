id: BUC-002
type: business-use-case
title: "Every code change traces to a requirement and propagates impact"
description: >
  Every commit, file, and test must be traceable to a requirement. When a
  requirement changes, downstream dependents must be flagged for re-verification.
  Nothing is built without purpose, nothing is changed without impact awareness.
rationale: >
  Without traceability, code accumulates without purpose (thul-studio: 12,814
  lines dead code). Without impact propagation, upstream changes silently break
  downstream features (CSP hardening broke grid page and TTS audio).
  Traceability and change propagation are the same concern — you can't
  propagate impact if you don't know what traces to what.
fit_criteria:
  user:
    criterion: >
      Every requirement has at least one code reference (TRACED status).
      Every commit message references at least one requirement ID.
      volere trace reports > 90% traced coverage. Every requirement change
      marks downstream dependents as suspect within one git operation.
      volere impact traverses the full dependency graph including cross_verify
      targets. Unresolved suspect links block CI when --suspects flag is set.
    verification: test
    test_type: system
    verification_method: system
dal: B
priority: must
status: implemented
