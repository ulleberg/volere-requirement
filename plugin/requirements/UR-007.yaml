id: UR-007
type: functional
title: "Report fit criteria coverage with volere coverage"

description: >
  The system must measure and report fit criteria test coverage per requirement
  and per dimension when volere coverage is run.

rationale: "Pending owner review"

fit_criteria:
  user:
    criterion: >
      volere coverage reports coverage percentage per requirement and per
      dimension. --dimension filters the report to a single dimension.
    verification: test
    test_type: system
    verification_method: system
  operational:
    criterion: >
      volere coverage counts fit criteria dimensions per card and checks
      that each dimension has at least one referencing test. A card with
      3 dimensions and 1 test shows as partially covered (1/3), not fully
      covered. Coverage percentage reflects dimensions covered, not cards.
    verification: test
    test_type: system

dal: C
priority: should
status: implemented

origin:
  stakeholder: extract-requirements
  date: "2026-03-31"
  trigger: "Codebase extraction"
  source: "plugin/cli/volere (cmd_coverage)"

history:
