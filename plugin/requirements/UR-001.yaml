id: UR-001
type: functional
title: Scaffold a new project with volere init

description: >
  Running volere init creates a project scaffold with requirements directory,
  DAL profile, module boundaries template, and documentation skeletons.

rationale: >
  Starting a new project today means hand-rolling CLAUDE.md, ARCHITECTURE.md,
  and hoping for the best. A scaffold makes the right structure the default,
  not the exception. Proven need: every thul-* project was set up differently
  until we standardized.

fit_criteria:
  user:
    criterion: >
      volere init --dal C creates: docs/requirements/README.md,
      docs/requirements/context.yaml, .volere/profile.yaml,
      .volere/boundaries.yaml. All files are valid against their schemas.
      Command completes in < 5 seconds.
    verification: test
    test_type: integration

dal: C
priority: must
status: deprecated
satisfaction: 5
dissatisfaction: 4

origin:
  stakeholder: Thomas Ulleberg
  date: "2026-03-30"
  trigger: "Every project set up differently — no consistent structure"

